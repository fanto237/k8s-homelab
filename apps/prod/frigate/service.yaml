apiVersion: v1
kind: Service
metadata:
  name: external-frigate
  namespace: frigate
spec:
  ports:
    - name: http
      protocol: TCP
      port: 5000
      targetPort: 5000

---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: external-frigate-slice
  namespace: frigate
  labels:
    kubernetes.io/service-name: external-frigate
addressType: IPv4
ports:
  - name: http
    protocol: TCP
    port: 5000
endpoints:
  - addresses:
      - "192.168.50.4"
    conditions:
      ready: true
