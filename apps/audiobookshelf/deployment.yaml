apiVersion: apps/v1
kind: Deployment
metadata:
  name: audiobookshelf
  namespace: audiobookshelf
  labels:
    app.kubernetes.io/name: audiobookshelf
spec:
  replicas: 1

  strategy:
    type: Recreate

  selector:
    matchLabels:
      app.kubernetes.io/name: audiobookshelf

  template:
    metadata:
      labels:
        app.kubernetes.io/name: audiobookshelf

    spec:
      terminationGracePeriodSeconds: 30

      # initContainers:
      #   - name: initialize-data-directories
      #     image: busybox:1.36.1
      #     imagePullPolicy: IfNotPresent

      #     command:
      #       - /bin/sh
      #       - -c
      #       - |
      #         set -eu

      #         mkdir -p /data/config
      #         mkdir -p /data/metadata

      #         echo "PVC directories:"
      #         ls -la /data

      #     volumeMounts:
      #       - name: application-data
      #         mountPath: /data

      containers:
        - name: audiobookshelf
          image: ghcr.io/advplyr/audiobookshelf:latest
          imagePullPolicy: Always

          env:
            - name: TZ
              value: Europe/Berlin

          ports:
            - name: http
              containerPort: 80
              hostPort: 3001
              protocol: TCP

          volumeMounts:
            - name: application-data
              mountPath: /config
              subPath: config

            - name: application-data
              mountPath: /metadata
              subPath: metadata

            - name: audiobooks
              mountPath: /audiobooks

            - name: podcasts
              mountPath: /podcasts

          resources:
            requests:
              cpu: 100m
              memory: 256Mi

            limits:
              memory: 2Gi

      volumes:
        - name: application-data
          persistentVolumeClaim:
            claimName: audiobookshelf-data

        - name: audiobooks
          persistentVolumeClaim:
            claimName: audiobookshelf-audiobooks

        - name: podcasts
          persistentVolumeClaim:
            claimName: audiobookshelf-podcasts
