apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: adguard-route
  namespace: adguard
spec:
  parentRefs:
    - name: gatewayapi
      namespace: traefik
      sectionName: https

  hostnames:
    - adguard.fanto.dev

  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: external-adguard
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /ad56
      backendRefs:
        - name: external-adguard56
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /ad86
      backendRefs:
        - name: external-adguard86
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /ad96
      backendRefs:
        - name: external-adguard96
          port: 8080
