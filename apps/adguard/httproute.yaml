apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: adguard-route
  namespace: adguard
spec:
  parentRefs:
    - name: gatewayapi
      namespace: traefik
      sectionName: https
  hostnames:
    - adguard.fanto.dev
    - ad56.adguard.fanto.dev
    - ad86.adguard.fanto.dev
    - ad96.adguard.fanto.dev
  rules:
    - matches:
        - hostname: adguard.fanto.dev
      backendRefs:
        - name: external-adguard
          port: 8080
    - matches:
        - hostname: ad56.adguard.fanto.dev
      backendRefs:
        - name: external-adguard56
          port: 8080
    - matches:
        - hostname: ad86.adguard.fanto.dev
      backendRefs:
        - name: external-adguard86
          port: 8080
    - matches:
        - hostname: ad96.adguard.fanto.dev
      backendRefs:
        - name: external-adguard96
          port: 8080
