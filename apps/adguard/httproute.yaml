apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: adguard-main-route
  namespace: adguard
spec:
  parentRefs:
    - name: gatewayapi
      namespace: traefik
      sectionName: https
  hostnames:
    - adguard.fanto.dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: external-adguard
          port: 8080
---
